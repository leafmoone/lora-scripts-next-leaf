<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>训练日志 — SD-Trainer</title>
  <style>
    :root {
      --bg: #0b0d12;
      --panel: #12151c;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #a78bfa;
      --ok: #34d399;
      --err: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
      font: 14px/1.5 ui-monospace, "Cascadia Code", "Sarasa Mono SC", Consolas, monospace;
    }
    header {
      padding: 12px 16px; background: var(--panel); border-bottom: 1px solid #1e293b;
      display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
    }
    header h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
    header code { font-size: 12px; color: var(--accent); word-break: break-all; }
    #status { font-size: 12px; color: var(--muted); }
    #status.live::before { content: "● "; color: var(--ok); }
    #status.done::before { content: "● "; color: var(--muted); }
    #log {
      margin: 0; padding: 16px;
      white-space: pre-wrap; word-break: break-word;
      min-height: calc(100vh - 56px);
    }
    .hint { padding: 16px; color: var(--muted); font-size: 13px; }
    .hint a { color: var(--accent); }
    .line-err { color: var(--err); }
  </style>
</head>
<body>
  <header>
    <h1>训练输出 / Train log</h1>
    <span id="status">等待连接…</span>
    <code id="tid"></code>
  </header>
  <pre id="log"></pre>
  <div id="hint" class="hint"></div>
  <script>
    const params = new URLSearchParams(location.search);
    const taskId = params.get("task_id");
    const logEl = document.getElementById("log");
    const statEl = document.getElementById("status");
    const tidEl = document.getElementById("tid");
    const hintEl = document.getElementById("hint");

    if (!taskId) {
      hintEl.innerHTML = '请在 URL 后加上 <code>?task_id=训练开始时返回的 UUID</code>。也可以在「开始训练」接口返回的 JSON <code>data.train_log_stream</code> 对应 SSE。';
      statEl.textContent = "未指定 task_id";
    } else {
      tidEl.textContent = taskId;
      const url = `/api/train/log/stream/${encodeURIComponent(taskId)}`;
      statEl.textContent = "连接中…";
      statEl.className = "live";

      let es;
      try {
        es = new EventSource(url);
      } catch (e) {
        statEl.textContent = "无法创建 EventSource";
        logEl.textContent = String(e);
      }

      if (es) {
        es.onmessage = (ev) => {
          try {
            const j = JSON.parse(ev.data);
            if (j.done) {
              statEl.textContent = "已完成";
              statEl.className = "done";
              es.close();
              return;
            }
            if (j.error) {
              statEl.textContent = j.error;
              statEl.className = "done";
              return;
            }
            if (j.text !== undefined) {
              logEl.textContent += j.text + "\n";
              logEl.scrollTop = logEl.scrollHeight;
              window.scrollTo(0, document.body.scrollHeight);
            }
          } catch (_) {
            logEl.textContent += ev.data + "\n";
          }
        };
        es.onerror = () => {
          if (statEl.textContent.indexOf("已完成") === -1) {
            statEl.textContent = "连接中断（若训练已结束可刷新）";
            statEl.className = "done";
          }
          es.close();
        };
      }
    }
  </script>
</body>
</html>
