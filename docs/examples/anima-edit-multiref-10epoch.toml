# 10-epoch dual-reference run on data/anima-edit-multiref-48 (MultiRef benchmark-real).
# Prepare data:
#   python script/ops/fetch_multiref_anima_edit_subset.py --count 48 --seed 42
# Train:
#   python -m accelerate.commands.launch --num_cpu_threads_per_process 1 \
#     scripts/dev/anima_train_network.py --config_file docs/examples/anima-edit-multiref-10epoch.toml

pretrained_model_name_or_path = "./sd-models/anima/anima-base-v1.0.safetensors"
vae = "./sd-models/anima/qwen_image_vae.safetensors"
qwen3 = "./sd-models/anima/qwen_3_06b_base.safetensors"

dataset_config = "./docs/examples/anima-edit-multiref-dataset.toml"
conditioning = true

resolution = "512,512"
enable_bucket = true
min_bucket_reso = 256
max_bucket_reso = 1024
bucket_reso_steps = 64

output_dir = "./output/anima-edit-multiref-10epoch"
output_name = "multiref-10e"
save_model_as = "safetensors"
save_precision = "bf16"
save_every_n_epochs = 5

network_module = "networks.lora_anima"
network_dim = 4
network_alpha = 4
network_train_unet_only = true

max_train_epochs = 10
train_batch_size = 1
gradient_checkpointing = true
learning_rate = 5e-5
unet_lr = 5e-5
optimizer_type = "AdamW8bit"
lr_scheduler = "constant"
mixed_precision = "bf16"
seed = 42

cache_latents = true
cache_latents_to_disk = false
cache_text_encoder_outputs = true
cache_text_encoder_outputs_to_disk = false
vae_chunk_size = 64
vae_disable_cache = true
max_data_loader_n_workers = 0
attn_mode = "torch"

sample_at_first = false
sample_every_n_epochs = 2
sample_prompts = "./docs/examples/anima-edit-sample-prompts.toml"

caption_extension = ".txt"
